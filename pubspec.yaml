name: smartcalc_mobile
description: "Android-first Flutter app for thermotechnical calculations."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.28.2
  drift_flutter: ^0.2.8
  flutter_riverpod: ^3.3.1
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.2
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.11.3
  talker: ^5.1.16
  talker_flutter: ^5.1.16
  talker_riverpod_logger: ^5.1.16

dev_dependencies:
  build_runner: ^2.10.4
  drift_dev: ^2.28.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/fonts/
